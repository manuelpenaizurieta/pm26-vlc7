name: Actualizar polla mundial

on:
  schedule:
    # cada 15 min (repo PUBLICO = minutos de Actions ilimitados). Reduce la espera
    # maxima tras un partido. GitHub puede retrasar un cron en horas pico, pero con
    # 4 pasadas/hora siempre cae una pronto. ESPN da el resultado al pitido final.
    - cron: '5,20,35,50 * * * *'
  push:
    branches: [main]       # también se lanza en cada push nuestro
    paths-ignore:
      - 'index.html'       # evita el bucle (el workflow hace push de index.html)
  workflow_dispatch:        # lanzamiento manual desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install numpy scipy

      - name: Ejecutar pipeline
        env:
          POLLA_EMAIL: ${{ secrets.POLLA_EMAIL }}
          POLLA_PASS: ${{ secrets.POLLA_PASS }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python daily_update.py

      - name: Publicar tablero
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions[bot]"
          git fetch origin main
          git reset --hard origin/main
          cp polla_v4.html index.html
          git add index.html
          git diff --staged --quiet || git commit -m "actualizacion $(date -u +%Y-%m-%dT%H:%M)"
          git push
