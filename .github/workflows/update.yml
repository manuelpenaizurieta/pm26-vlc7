name: Actualizar polla mundial

# El schedule de GitHub Actions es POCO FIABLE (se salta ejecuciones durante horas).
# Solucion sin depender de el ni de servicios externos: cada run arranca un BUCLE que
# actualiza cada 15 min durante ~5,5h. Mientras haya un run vivo, el sistema se
# actualiza solo. El schedule cada hora solo sirve para RE-ARRANCAR el bucle si se
# cayo; el trabajo de cada 15 min lo garantiza el bucle interno, no el reloj de GitHub.
on:
  schedule:
    - cron: '7 * * * *'    # re-arranca el bucle (poco fiable: GitHub se salta ejecuciones)
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'       # el bucle pushea index.html; no debe re-disparar el workflow
  workflow_dispatch:

concurrency:
  group: polla-update
  cancel-in-progress: true  # un arranque nuevo reemplaza al bucle viejo (nunca dos a la vez)

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 355     # ~5,9h por run
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install numpy scipy
      - name: Bucle de actualizacion (cada 15 min, ~5,4h por run)
        env:
          POLLA_EMAIL: ${{ secrets.POLLA_EMAIL }}
          POLLA_PASS: ${{ secrets.POLLA_PASS }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GH_TOKEN: ${{ secrets.TRIGGER_PAT }}   # PAT para auto-lanzar el siguiente run (gh workflow run)
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions[bot]"
          END=$((SECONDS + 20400))   # ~5,7h de bucle; al acabar, se auto-lanza el siguiente run con el PAT
          while true; do
            echo "=== vuelta $(date -u +%H:%M:%S) UTC ==="
            git fetch origin main && git reset --hard origin/main
            python daily_update.py || echo "pipeline fallo esta vuelta, sigo"
            cp polla_v4.html index.html || true
            git add index.html
            git diff --staged --quiet || git commit -m "auto $(date -u +%Y-%m-%dT%H:%M)"
            git push || echo "push fallo, reintento la siguiente vuelta"
            if [ $SECONDS -ge $END ]; then
              echo "fin del bucle (~5,7h): lanzo el siguiente run con el PAT (cadena continua)"
              gh workflow run "Actualizar polla mundial" && echo "siguiente run lanzado OK" || echo "FALLO al relanzar (revisar TRIGGER_PAT)"
              break
            fi
            # Dormir hasta ~2,5 min antes del PROXIMO cierre (saque-30 min) para dejar la
            # apuesta DEFINITIVA pegada al cierre (capta cambios de ultimo minuto); si no hay
            # cierre cercano -> cadencia normal de 15 min. Si falla el calculo -> 900s.
            nap=$(python -c "import json,time;pm=json.load(open('polla_matches.json'));now=time.time()*1000;C=1800000;f=[m['ts']-C for m in pm.values() if m.get('ts') and m.get('st')=='G' and not m.get('pf') and m['ts']-C>now];print(int(max(45,min(900,(min(f)-now)/1000-150))) if f else 900)" 2>/dev/null || echo 900)
            echo "duermo ${nap}s (el proximo cierre marca el ritmo)"
            sleep "$nap"
          done
