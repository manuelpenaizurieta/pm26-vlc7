name: Actualizar polla mundial

on:
  schedule:
    - cron: '5 * * * *'   # cada hora a las :05 UTC (GitHub es más fiable con intervalos >=1h)
    - cron: '35 * * * *'  # segunda pasada a las :35 UTC (2 veces por hora = cada 30 min)
  push:
    branches: [main]       # también se lanza en cada push nuestro
    paths-ignore:
      - 'index.html'       # evita el bucle (el workflow hace push de index.html)
  workflow_dispatch:        # lanzamiento manual desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install numpy scipy

      - name: Ejecutar pipeline
        env:
          POLLA_EMAIL: ${{ secrets.POLLA_EMAIL }}
          POLLA_PASS: ${{ secrets.POLLA_PASS }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python daily_update.py

      - name: Publicar tablero
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions[bot]"
          git fetch origin main
          git reset --hard origin/main
          cp polla_v4.html index.html
          git add index.html
          git diff --staged --quiet || git commit -m "actualizacion $(date -u +%Y-%m-%dT%H:%M)"
          git push
